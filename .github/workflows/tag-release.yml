name: Tag release

# When a "Release x.y.z" PR merges to main, this pushes the matching vX.Y.Z tag, which triggers
# release.yml to publish. Cut releases with `pnpm release <version>` (see README "Releasing") — this
# workflow is the automatic second half.
#
# Required secret:
#   RELEASE_PAT - a PAT with `repo` scope (or a fine-grained PAT with Contents: read/write on this
#                 repo). The tag MUST be pushed with a PAT, not the default GITHUB_TOKEN: GitHub does
#                 not re-trigger tag-driven workflows for tags pushed by GITHUB_TOKEN, so release.yml
#                 would never fire. If RELEASE_PAT is unset, this job no-ops with a notice and you can
#                 fall back to the manual `git tag vX.Y.Z && git push origin vX.Y.Z` on main.

on:
  push:
    branches: [main]
    paths: ["apps/edge-node/package.json"]

concurrency:
  group: tag-release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check RELEASE_PAT is configured
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::notice::RELEASE_PAT not set — skipping auto-tag. Push the tag manually: git tag vX.Y.Z && git push origin vX.Y.Z"
            echo "skip=true" >> "$GITHUB_ENV"
          fi

      - if: env.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Create and push tag
        if: env.skip != 'true'
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/edge-node/package.json').version")
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "::notice::tag ${TAG} already exists — nothing to do"
            exit 0
          fi
          git config user.name "dahrk-release"
          git config user.email "release@dahrk.ai"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "::notice::pushed ${TAG} — release.yml will publish"

name: Release

# Tag-driven release for the `dahrk-node` npm package (the edge client; binary/command `dahrk`).
#
# Cut a release with `pnpm release <version>` (see README "Releasing"): it bumps apps/edge-node and root
# package.json, rewrites the CHANGELOG, and opens a "Release x.y.z" PR. Merging that PR lets
# tag-release.yml push the matching vX.Y.Z tag, which fires this workflow. (Manual equivalent, if you
# skip the tooling: bump the version, move the CHANGELOG [Unreleased] entries into a versioned section,
# commit, then `git tag vX.Y.Z && git push origin vX.Y.Z`.)
#
# This workflow then: gates that the tag equals the package version, runs the CI checks, publishes to
# npm, bumps the Homebrew tap formula, and cuts a GitHub release from the changelog.
#
# Required secrets:
#   NPM_TOKEN       - a *classic Automation* token on the npm account that owns `dahrk-node`. The account
#                     has 2FA-on-write, so a granular/publish token would still prompt for an OTP in
#                     CI; only a classic Automation token bypasses the OTP. Store it as a repo secret.
#   TAP_PUSH_TOKEN  - a PAT with `repo` scope on github.com/dahrkai/homebrew-tap. Optional: if unset,
#                     the tap-bump step is skipped (e.g. before the tap repo exists). See
#                     packaging/homebrew/README.md.
#   RELEASE_PAT     - used by tag-release.yml (not this workflow) to push the tag so this workflow fires;
#                     a tag pushed by the default GITHUB_TOKEN would not re-trigger it. See
#                     tag-release.yml. Optional: if unset, push the tag manually.
#   HARNESS_DISPATCH_PAT - a fine-grained PAT on github.com/dahrkai/dahrk-harness with `Contents: read and
#                     write`, used to tell the harness a new client is out so its platform edge node
#                     updates itself. Optional: if unset, the notify step is skipped and the harness can
#                     be updated by hand (`gh workflow run update-platform-node.yml`).
#   WEB_DISPATCH_PAT - a fine-grained PAT on github.com/dahrkai/dahrk-web with `Contents: read and
#                     write`, used to rebuild dahrk.ai/changelog, which is generated from this repo's
#                     GitHub Releases feed. Optional: if unset, the notify step is skipped and the page
#                     can be refreshed by hand (`gh workflow run deploy.yml --repo dahrkai/dahrk-web`).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
      HARNESS_DISPATCH_PAT: ${{ secrets.HARNESS_DISPATCH_PAT }}
      WEB_DISPATCH_PAT: ${{ secrets.WEB_DISPATCH_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./apps/edge-node/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($TAG_VERSION) does not match package version $PKG_VERSION" >&2
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # Last gate before an immutable publish: install the packaged tarball into a clean tree (external
      # deps resolved fresh from the registry, exactly as a user would) and run it. If the artifact
      # cannot load — e.g. a dependency was published with uncompiled source — fail here, not in the
      # field. This is the check that would have blocked the 0.1.5 release.
      - name: Smoke-test the packaged client before publishing
        run: bash scripts/smoke-pack.sh

      - name: Publish to npm
        working-directory: apps/edge-node
        # pnpm publish rewrites the workspace: protocol on the bundled internal deps and honours the
        # prepack build; --no-git-checks because CI publishes from a detached tag, not a branch.
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Pull the section for this version out of CHANGELOG.md (between "## [VERSION]" and the next
          # "## "). Matches a dated heading (`## [x.y.z] - YYYY-MM-DD`) too — the version is a prefix.
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { grab=1; next }
              grab && /^## / { exit }
              grab { print }
            ' CHANGELOG.md > /tmp/notes.md
          fi
          if [ ! -s /tmp/notes.md ]; then
            echo "Release ${VERSION}." > /tmp/notes.md
          fi
          echo "path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}

      # Homebrew is a secondary channel, and a freshly published npm tarball can take several minutes to
      # propagate to the registry CDN. Keep this LAST and NON-FATAL: npm + the GitHub release above are
      # the release, so a slow tarball must never fail the run or block them. If it doesn't appear in
      # time, warn and skip — bump the tap later once the tarball is live (see packaging/homebrew).
      - name: Bump Homebrew tap formula
        if: env.TAP_PUSH_TOKEN != ''
        continue-on-error: true
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -uo pipefail
          TARBALL="https://registry.npmjs.org/dahrk-node/-/dahrk-node-${VERSION}.tgz"
          # Poll up to ~10 minutes for the tarball to propagate.
          for attempt in $(seq 1 30); do
            if curl -fsSL "$TARBALL" -o /tmp/dahrk.tgz && [ -s /tmp/dahrk.tgz ]; then break; fi
            echo "tarball not available yet (attempt $attempt/30), retrying in 20s..."
            sleep 20
          done
          if [ ! -s /tmp/dahrk.tgz ]; then
            echo "::warning::npm tarball for ${VERSION} did not propagate in time; skipped the Homebrew tap bump. Re-run it once the tarball is live."
            exit 0
          fi
          SHA=$(shasum -a 256 /tmp/dahrk.tgz | cut -d' ' -f1)
          echo "sha256=$SHA"

          git clone --depth 1 "https://x-access-token:${TAP_PUSH_TOKEN}@github.com/dahrkai/homebrew-tap.git" tap
          FORMULA=tap/Formula/dahrk.rb
          # Repoint url + sha256 to this release. The formula's `version` is derived from the url.
          sed -i -E "s|url \".*\"|url \"${TARBALL}\"|" "$FORMULA"
          sed -i -E "s|sha256 \".*\"|sha256 \"${SHA}\"|" "$FORMULA"
          cd tap
          git config user.name "dahrk-release"
          git config user.email "release@dahrk.ai"
          if git diff --quiet; then
            echo "formula already at ${VERSION}, nothing to push"
          else
            git commit -am "dahrk ${VERSION}"
            git push
          fi

      # Tell the harness a new client is out, so its PLATFORM EDGE NODE updates itself (harness DHK-437).
      # That node runs every hub-launched debug and triage run, and used to sit on a hand-maintained pin
      # in the harness Dockerfile: the pin went stale, the node shipped a client that could not
      # authenticate (#63), and the whole admin loop silently stopped. It now tracks the latest published
      # client, and this is what tells it a release landed.
      #
      # NON-FATAL and LAST, exactly like the tap bump above: npm + the GitHub release are the release. A
      # downstream repo being unreachable must never fail this run or block a publish. If it is skipped,
      # the harness can be updated by hand with `gh workflow run update-platform-node.yml`.
      - name: Notify dahrk-harness of the new client
        if: env.HARNESS_DISPATCH_PAT != ''
        continue-on-error: true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.HARNESS_DISPATCH_PAT }}
        run: |
          set -uo pipefail
          if gh api /repos/dahrkai/dahrk-harness/dispatches \
               -f event_type=dahrk-node-released \
               -F "client_payload[version]=${VERSION}"; then
            echo "notified dahrk-harness: dahrk-node ${VERSION} released"
          else
            echo "::warning::could not notify dahrk-harness of ${VERSION}; update the platform node manually (gh workflow run update-platform-node.yml)"
          fi

      # Tell the marketing site a new client is out, so dahrk.ai/changelog rebuilds. That page is built
      # from this repo's GitHub Releases feed (dahrk-web src/changelog.ts), so a release changes the
      # site without any commit landing there: nothing would trigger a deploy, and the changelog would
      # lag every release until an unrelated push happened to rebuild it. This is what refreshes it.
      #
      # NON-FATAL and LAST, exactly like the tap bump and the harness notify above: npm + the GitHub
      # release are the release. If it is skipped, refresh the page by hand with
      # `gh workflow run deploy.yml --repo dahrkai/dahrk-web`.
      - name: Notify dahrk-web of the new client
        if: env.WEB_DISPATCH_PAT != ''
        continue-on-error: true
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.WEB_DISPATCH_PAT }}
        run: |
          set -uo pipefail
          if gh api /repos/dahrkai/dahrk-web/dispatches \
               -f event_type=dahrk-node-released \
               -F "client_payload[version]=${VERSION}"; then
            echo "notified dahrk-web: dahrk-node ${VERSION} released"
          else
            echo "::warning::could not refresh the dahrk.ai changelog for ${VERSION}; rerun it by hand (gh workflow run deploy.yml --repo dahrkai/dahrk-web)"
          fi
